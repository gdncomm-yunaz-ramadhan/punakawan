openapi: 3.0.3
info:
  title: Widgets API
  version: "1.0.1"
paths:
  /widgets:
    get:
      operationId: listWidgets
      parameters: []
      responses:
        "200":
          description: A list of widgets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
